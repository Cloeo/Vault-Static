<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault n Drop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080808; --green: #39ff85; --card: #0e0e0e; --border: #1a1a1a;
      --border2: #222; --text: #e8e8e8; --muted: #444; --muted2: #666;
      --input-bg: #0d0d0d; --red: #ff4d4d; --blue: #4d9fff;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    #bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.011) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.011) 1px, transparent 1px); background-size: 90px 90px; pointer-events: none; z-index: 0; }
    #wrap { max-width: 720px; margin: 0 auto; padding: 72px 24px 100px; position: relative; z-index: 1; }
    #back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted2); font-size: 0.78rem; text-decoration: none; margin-bottom: 44px; transition: color 0.2s; }
    #back:hover { color: var(--text); }
    #proj-header { margin-bottom: 28px; display: flex; flex-direction: column; gap: 10px; }
    #proj-title { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    #proj-meta { font-size: 0.77rem; color: var(--muted2); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    #proj-desc { font-size: 0.88rem; color: var(--muted2); line-height: 1.7; }

    #stats-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-pill { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border2); border-radius: 100px; font-size: 0.76rem; color: var(--muted2); background: var(--card); transition: all 0.2s; user-select: none; }
    .stat-pill svg { width: 13px; height: 13px; flex-shrink: 0; }
    #btn-like { cursor: pointer; }
    #btn-like:hover { border-color: rgba(255,80,80,0.4); color: #ff6b6b; }
    #btn-like.liked { border-color: rgba(255,80,80,0.4); color: #ff6b6b; background: rgba(255,80,80,0.05); }
    #btn-comments { cursor: pointer; }
    #btn-comments:hover { border-color: rgba(77,159,255,0.3); color: var(--blue); }

    #proj-actions { display: flex; gap: 10px; margin-bottom: 28px; }
    #btn-delete { background: none; border: 1px solid rgba(255,77,77,0.25); color: rgba(255,77,77,0.7); border-radius: 100px; padding: 7px 18px; font-size: 0.75rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
    #btn-delete:hover { background: rgba(255,77,77,0.08); border-color: var(--red); color: var(--red); }

    #file-section { display: flex; flex-direction: column; gap: 8px; }
    .file-row { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .file-row:hover { border-color: var(--border2); background: #111; }
    .file-row-name { flex: 1; font-size: 0.85rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-row-size { font-size: 0.74rem; color: var(--muted); flex-shrink: 0; }
    .file-row-action { font-size: 0.72rem; color: var(--muted2); flex-shrink: 0; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 6px; transition: color 0.2s, border-color 0.2s; }
    .file-row:hover .file-row-action { color: var(--green); border-color: rgba(57,255,133,0.25); }

    #raw-view { display: none; }
    #raw-view.active { display: block; }
    #project-view.hidden { display: none; }
    #raw-header { position: sticky; top: 0; background: #0a0a0a; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    #raw-filename { font-size: 0.82rem; color: var(--muted2); }
    #raw-back-btn { background: none; border: 1px solid var(--border2); color: var(--muted2); border-radius: 6px; padding: 5px 14px; font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.2s, border-color 0.2s; }
    #raw-back-btn:hover { color: var(--text); border-color: var(--muted); }
    #raw-content { padding: 32px 24px; font-family: 'Courier New', monospace; font-size: 0.82rem; line-height: 1.75; color: #ccc; white-space: pre-wrap; word-break: break-word; max-width: 900px; margin: 0 auto; }

    #comments-panel {
      position: fixed; width: 360px; background: #0c0c0c; border: 1px solid var(--border2);
      border-radius: 14px; z-index: 500; display: none; flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6); overflow: hidden;
      bottom: 40px; right: 40px;
    }
    #comments-panel.open { display: flex; }
    #comments-drag-handle { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: grab; user-select: none; flex-shrink: 0; }
    #comments-drag-handle:active { cursor: grabbing; }
    #comments-drag-title { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; }
    #comments-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 2px 6px; border-radius: 4px; transition: color 0.2s; }
    #comments-close:hover { color: var(--text); }
    #comments-list { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; max-height: 320px; min-height: 120px; }
    #comments-empty { font-size: 0.8rem; color: var(--muted); text-align: center; padding: 24px 0; }
    .comment-item { display: flex; flex-direction: column; gap: 4px; }
    .comment-user { font-size: 0.72rem; color: var(--green); font-weight: 500; }
    .comment-body { font-size: 0.82rem; color: var(--muted2); line-height: 1.5; word-break: break-word; }
    .comment-time { font-size: 0.68rem; color: var(--muted); }
    #comments-input-area { border-top: 1px solid var(--border); padding: 12px 14px; display: flex; gap: 8px; flex-shrink: 0; }
    #comment-input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 0.8rem; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; resize: none; }
    #comment-input:focus { border-color: rgba(77,159,255,0.3); }
    #comment-input::placeholder { color: #2a2a2a; }
    #comment-send { background: var(--blue); color: #000; border: none; border-radius: 8px; padding: 9px 16px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem; cursor: pointer; flex-shrink: 0; transition: background 0.2s; }
    #comment-send:hover { background: #fff; }
    #comment-login-note { padding: 12px 16px; font-size: 0.75rem; color: var(--muted2); border-top: 1px solid var(--border); text-align: center; }
    #comment-login-note a { color: var(--blue); text-decoration: none; }

    #pw-gate { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 80px 24px; text-align: center; }
    #pw-gate-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
    #pw-gate-sub { font-size: 0.82rem; color: var(--muted2); }
    #pw-gate-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
    #pw-gate-label { font-size: 0.7rem; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.1em; text-align: left; }
    #pw-input { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; font-size: 0.88rem; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
    #pw-input:focus { border-color: rgba(57,255,133,0.3); }
    #pw-input.shake { animation: shake 0.35s ease; border-color: rgba(255,77,77,0.4); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    #pw-btn { background: var(--green); color: #000; border: none; border-radius: 100px; padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
    #pw-btn:hover { background: #fff; }

    #confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    #confirm-overlay.open { opacity: 1; pointer-events: all; }
    #confirm-box { background: #0e0e0e; border: 1px solid var(--border2); border-radius: 16px; padding: 32px 36px; width: 360px; display: flex; flex-direction: column; gap: 16px; transform: scale(0.96); transition: transform 0.2s cubic-bezier(0.16,1,0.3,1); }
    #confirm-overlay.open #confirm-box { transform: scale(1); }
    #confirm-box h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; }
    #confirm-box p { font-size: 0.82rem; color: var(--muted2); line-height: 1.6; }
    #confirm-actions { display: flex; gap: 10px; }
    #confirm-cancel { flex: 1; background: none; border: 1px solid var(--border2); color: var(--muted2); border-radius: 100px; padding: 11px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: color 0.2s; }
    #confirm-cancel:hover { color: var(--text); }
    #confirm-delete { flex: 1; background: var(--red); color: #fff; border: none; border-radius: 100px; padding: 11px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }
    #confirm-delete:hover { background: #ff6b6b; }

    #not-found { padding: 80px 0; text-align: center; color: var(--muted); }
    #not-found h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; color: var(--text); }
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: #141414; border: 1px solid var(--border2); border-radius: 100px; padding: 11px 22px; font-size: 0.8rem; color: var(--text); opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 999; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { color: var(--green); border-color: rgba(57,255,133,0.2); }
    #toast.error { color: #ff6b6b; border-color: rgba(255,77,77,0.2); }
  </style>
</head>
<body>
  <div id="bg-grid"></div>

  <div id="raw-view">
    <div id="raw-header">
      <span id="raw-filename"></span>
      <button id="raw-back-btn">← back to project</button>
    </div>
    <div id="raw-content">loading...</div>
  </div>

  <div id="project-view">
    <div id="wrap">
      <a href="/" id="back">← vault n drop</a>
      <div id="root"></div>
    </div>
  </div>

  <div id="comments-panel">
    <div id="comments-drag-handle">
      <span id="comments-drag-title">comments</span>
      <button id="comments-close">✕</button>
    </div>
    <div id="comments-list"></div>
    <div id="comments-input-area" style="display:none">
      <textarea id="comment-input" placeholder="write a comment..." rows="1"></textarea>
      <button id="comment-send">send</button>
    </div>
    <div id="comment-login-note" style="display:none">
      <a href="/accountauth">log in</a> to leave a comment
    </div>
  </div>

  <div id="confirm-overlay">
    <div id="confirm-box">
      <h3>delete project?</h3>
      <p>this will permanently delete this project and all its files. this cannot be undone.</p>
      <div id="confirm-actions">
        <button id="confirm-cancel">cancel</button>
        <button id="confirm-delete">delete</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const slug = window.location.pathname.split('/p/')[1];
    let unlockedPassword = null;
    let currentUser = null;
    let projectData = null;
    let toastTimer = null;

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function timeAgo(ts) {
      const diff = Math.floor(Date.now() / 1000) - ts;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function showToast(msg, type) {
      clearTimeout(toastTimer);
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + (type || '');
      toastTimer = setTimeout(() => { t.className = ''; }, 3000);
    }

    async function getMe() {
      try {
        const r = await fetch('/api/me', { credentials: 'same-origin' });
        if (r.ok) currentUser = await r.json();
      } catch (e) {}
    }

    async function load(password) {
      await getMe();
      const root = document.getElementById('root');
      root.innerHTML = '';
      let url = '/api/projects/' + slug;
      if (password) url += '?password=' + encodeURIComponent(password);
      try {
        const res = await fetch(url, { credentials: 'same-origin' });
        const data = await res.json();
        if (data.locked) { renderGate(!!password); return; }
        if (!res.ok) { renderNotFound(); return; }
        unlockedPassword = password || null;
        projectData = data;
        renderProject(data);
      } catch (e) { renderNotFound(); }
    }

    function renderProject(data) {
      document.title = data.title + ' — Vault n Drop';
      const root = document.getElementById('root');

      const header = document.createElement('div');
      header.id = 'proj-header';
      header.innerHTML =
        '<h1 id="proj-title">' + esc(data.title) + '</h1>' +
        '<div id="proj-meta"><span>by ' + esc(data.owner) + '</span><span>·</span><span>' + data.files.length + ' file' + (data.files.length !== 1 ? 's' : '') + '</span>' +
        (data.is_downloadable ? '<span>·</span><span>downloadable</span>' : '') +
        (data.is_private ? '<span>·</span><span style="color:var(--muted)">private</span>' : '') + '</div>' +
        (data.description ? '<p id="proj-desc">' + esc(data.description) + '</p>' : '');
      root.appendChild(header);

      const statsBar = document.createElement('div');
      statsBar.id = 'stats-bar';
      statsBar.innerHTML =
        '<div class="stat-pill" id="stat-views"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><span id="views-count">' + (data.views || 0) + '</span></div>' +
        '<div class="stat-pill" id="btn-like' + (data.user_liked ? ' liked' : '') + '" id="btn-like"><svg viewBox="0 0 24 24" fill="' + (data.user_liked ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span id="likes-count">' + (data.likes || 0) + '</span></div>' +
        '<div class="stat-pill" id="btn-comments"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span id="comments-count">' + (data.comments || 0) + '</span></div>';
      root.appendChild(statsBar);

      const likeBtn = statsBar.querySelector('#btn-like') || document.getElementById('btn-like');
      const realLikeBtn = statsBar.children[1];
      realLikeBtn.id = 'btn-like';
      if (data.user_liked) realLikeBtn.classList.add('liked');

      if (!data.is_private && currentUser) {
        realLikeBtn.addEventListener('click', async () => {
          try {
            const r = await fetch('/api/projects/' + slug + '/like', { method: 'POST', credentials: 'same-origin' });
            const d = await r.json();
            if (r.ok) {
              document.getElementById('likes-count').textContent = d.likes;
              const btn = document.getElementById('btn-like');
              btn.classList.toggle('liked', d.liked);
              btn.querySelector('svg').setAttribute('fill', d.liked ? 'currentColor' : 'none');
            }
          } catch (e) {}
        });
      }

      statsBar.children[2].addEventListener('click', () => {
        const panel = document.getElementById('comments-panel');
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) loadComments();
      });

      if (data.is_owner) {
        const actions = document.createElement('div');
        actions.id = 'proj-actions';
        actions.innerHTML = '<button id="btn-delete">delete project</button>';
        root.appendChild(actions);
        document.getElementById('btn-delete').addEventListener('click', () => {
          document.getElementById('confirm-overlay').classList.add('open');
        });
      }

      const section = document.createElement('div');
      section.id = 'file-section';
      data.files.forEach(f => {
        const row = document.createElement('div');
        row.className = 'file-row';
        const canView = f.is_text;
        const canDownload = data.is_downloadable;
        const action = canView ? 'view' : (canDownload ? 'download' : '');
        row.innerHTML =
          '<span class="file-row-name">' + esc(f.name) + '</span>' +
          '<span class="file-row-size">' + esc(f.size_label) + '</span>' +
          (action ? '<span class="file-row-action">' + action + '</span>' : '');
        if (canView) row.addEventListener('click', () => openRawView(f));
        else if (canDownload) row.addEventListener('click', () => { window.location.href = '/api/projects/' + data.slug + '/download/' + f.id; });
        section.appendChild(row);
      });
      root.appendChild(section);

      setupCommentPanel(data);
    }

    function setupCommentPanel(data) {
      const inputArea = document.getElementById('comments-input-area');
      const loginNote = document.getElementById('comment-login-note');
      if (data.is_private) {
        loginNote.style.display = 'none';
        inputArea.style.display = 'none';
      } else if (currentUser) {
        inputArea.style.display = 'flex';
        loginNote.style.display = 'none';
      } else {
        inputArea.style.display = 'none';
        loginNote.style.display = 'block';
      }

      document.getElementById('comment-send').addEventListener('click', async () => {
        const input = document.getElementById('comment-input');
        const body = input.value.trim();
        if (!body) return;
        try {
          const r = await fetch('/api/projects/' + slug + '/comments', {
            method: 'POST', credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ body })
          });
          const d = await r.json();
          if (r.ok) {
            input.value = '';
            appendComment(d);
            const cc = document.getElementById('comments-count');
            cc.textContent = parseInt(cc.textContent || 0) + 1;
            document.getElementById('comments-empty') && (document.getElementById('comments-empty').style.display = 'none');
          } else showToast(d.error || 'could not send', 'error');
        } catch (e) { showToast('could not send', 'error'); }
      });

      document.getElementById('comment-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('comment-send').click(); }
      });
    }

    async function loadComments() {
      const list = document.getElementById('comments-list');
      list.innerHTML = '<div id="comments-empty" style="font-size:0.8rem;color:var(--muted);text-align:center;padding:24px 0">loading...</div>';
      try {
        const r = await fetch('/api/projects/' + slug + '/comments', { credentials: 'same-origin' });
        const comments = await r.json();
        list.innerHTML = '';
        if (!comments.length) {
          list.innerHTML = '<div id="comments-empty" style="font-size:0.8rem;color:var(--muted);text-align:center;padding:24px 0">no comments yet</div>';
          return;
        }
        comments.forEach(c => appendComment(c));
      } catch (e) { list.innerHTML = '<div style="font-size:0.8rem;color:var(--muted);text-align:center;padding:24px 0">could not load</div>'; }
    }

    function appendComment(c) {
      const list = document.getElementById('comments-list');
      const empty = document.getElementById('comments-empty');
      if (empty) empty.remove();
      const item = document.createElement('div');
      item.className = 'comment-item';
      item.innerHTML = '<span class="comment-user">' + esc(c.username) + '</span><span class="comment-body">' + esc(c.body) + '</span><span class="comment-time">' + timeAgo(c.created_at) + '</span>';
      list.appendChild(item);
      list.scrollTop = list.scrollHeight;
    }

    document.getElementById('comments-close').addEventListener('click', () => {
      document.getElementById('comments-panel').classList.remove('open');
    });

    const handle = document.getElementById('comments-drag-handle');
    const panel = document.getElementById('comments-panel');
    let dragging = false, dragOffX = 0, dragOffY = 0;

    handle.addEventListener('mousedown', (e) => {
      dragging = true;
      const rect = panel.getBoundingClientRect();
      dragOffX = e.clientX - rect.left;
      dragOffY = e.clientY - rect.top;
      panel.style.bottom = 'auto';
      panel.style.right = 'auto';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      let x = e.clientX - dragOffX;
      let y = e.clientY - dragOffY;
      x = Math.max(0, Math.min(x, window.innerWidth - panel.offsetWidth));
      y = Math.max(0, Math.min(y, window.innerHeight - panel.offsetHeight));
      panel.style.left = x + 'px';
      panel.style.top = y + 'px';
    });

    document.addEventListener('mouseup', () => { dragging = false; });

    function openRawView(file) {
      const rawView = document.getElementById('raw-view');
      const projectView = document.getElementById('project-view');
      document.getElementById('raw-filename').textContent = file.name;
      document.getElementById('raw-content').textContent = 'loading...';
      rawView.classList.add('active');
      projectView.classList.add('hidden');
      let url = '/api/projects/' + projectData.slug + '/file/' + file.id + '/view';
      if (unlockedPassword) url += '?password=' + encodeURIComponent(unlockedPassword);
      fetch(url, { credentials: 'same-origin' })
        .then(r => r.text())
        .then(t => { document.getElementById('raw-content').textContent = t; })
        .catch(() => { document.getElementById('raw-content').textContent = 'could not load file.'; });
    }

    document.getElementById('raw-back-btn').addEventListener('click', () => {
      document.getElementById('raw-view').classList.remove('active');
      document.getElementById('project-view').classList.remove('hidden');
    });

    function renderGate(wrong) {
      document.title = 'Private Project — Vault n Drop';
      const root = document.getElementById('root');
      root.innerHTML =
        '<div id="pw-gate"><h2 id="pw-gate-title">private project</h2><p id="pw-gate-sub">this project is password protected</p>' +
        '<div id="pw-gate-form"><label id="pw-gate-label">enter project password</label>' +
        '<input id="pw-input" type="password" placeholder="project password" />' +
        (wrong ? '<span style="font-size:0.78rem;color:#ff6b6b;">wrong password</span>' : '') +
        '<button id="pw-btn">unlock</button></div></div>';
      const input = document.getElementById('pw-input');
      document.getElementById('pw-btn').addEventListener('click', () => {
        const val = input.value.trim();
        if (!val) { input.classList.add('shake'); setTimeout(() => input.classList.remove('shake'), 400); return; }
        load(val);
      });
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('pw-btn').click(); });
    }

    function renderNotFound() {
      document.title = 'Not Found — Vault n Drop';
      document.getElementById('root').innerHTML = '<div id="not-found"><h2>project not found</h2><p>this project may have been deleted or never existed.</p></div>';
    }

    document.getElementById('confirm-cancel').addEventListener('click', () => {
      document.getElementById('confirm-overlay').classList.remove('open');
    });

    document.getElementById('confirm-delete').addEventListener('click', async () => {
      document.getElementById('confirm-delete').textContent = 'deleting...';
      try {
        const res = await fetch('/api/projects/' + slug, { method: 'DELETE', credentials: 'same-origin' });
        if (res.ok) { showToast('project deleted', 'success'); setTimeout(() => { window.location.href = '/projectstorage'; }, 1200); }
        else { showToast('could not delete', 'error'); document.getElementById('confirm-delete').textContent = 'delete'; document.getElementById('confirm-overlay').classList.remove('open'); }
      } catch (e) { showToast('could not delete', 'error'); document.getElementById('confirm-delete').textContent = 'delete'; document.getElementById('confirm-overlay').classList.remove('open'); }
    });

    document.getElementById('confirm-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('confirm-overlay')) document.getElementById('confirm-overlay').classList.remove('open');
    });

    load(null);
  </script>
</body>
</html>
