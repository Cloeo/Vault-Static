<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault n Drop — Projects</title>
  <link rel="stylesheet" href="projects.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="bg-grid"></div>

  <aside id="sidebar">
    <a href="/" id="sidebar-logo">vault n drop</a>
    <nav>
      <a href="/projectstorage" class="nav-item active" id="nav-storage">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        project storage
      </a>
      <a href="#" class="nav-item" id="nav-public">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        public projects
      </a>
    </nav>
    <div id="sidebar-user">
      <div id="sidebar-avatar"></div>
      <span id="sidebar-username">loading...</span>
      <button id="btn-logout">out</button>
    </div>
  </aside>

  <main id="main-area">

    <section id="view-storage" class="view active">
      <div id="storage-header">
        <h1>project storage</h1>
        <button id="btn-new-project">+ new project</button>
      </div>

      <div id="projects-grid"></div>

      <div id="empty-state">
        <p>no projects yet. create one to get started.</p>
      </div>
    </section>

    <section id="view-public" class="view">
      <div id="storage-header">
        <h1>public projects</h1>
      </div>
      <div id="public-grid"></div>
      <div id="public-empty">
        <p>no public projects yet.</p>
      </div>
    </section>

  </main>

  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-header">
        <h2>new project</h2>
        <button id="modal-close">✕</button>
      </div>

      <div id="drop-zone">
        <div id="drop-inner">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>drop files or folders here</p>
          <div id="drop-browse-btns">
            <button type="button" id="btn-browse-files">browse files</button>
            <button type="button" id="btn-browse-folder">browse folder</button>
          </div>
        </div>
        <input type="file" id="file-input" multiple webkitdirectory style="display:none" />
        <input type="file" id="file-input-single" multiple style="display:none" />
      </div>

      <div id="file-list"></div>

      <div id="project-fields">
        <div class="field-group">
          <label>project storage title</label>
          <input type="text" id="proj-title" placeholder="name your project" />
        </div>
        <div class="field-group">
          <label>project storage description</label>
          <textarea id="proj-desc" placeholder="describe your project" rows="3"></textarea>
        </div>

        <div class="check-row">
          <input type="checkbox" id="chk-private" />
          <label for="chk-private">make private</label>
        </div>

        <div id="password-field" class="field-group hidden">
          <label>enter project password</label>
          <input type="password" id="proj-password" placeholder="set a password" />
        </div>

        <div class="check-row">
          <input type="checkbox" id="chk-download" />
          <label for="chk-download">project is downloadable</label>
        </div>

        <div class="check-row">
          <input type="checkbox" id="chk-instant" />
          <label for="chk-instant">instant download</label>
        </div>
      </div>

      <button id="btn-publish">publish project</button>
    </div>
  </div>

  <div id="toast"></div>

  <div id="edit-modal-overlay">
    <div id="edit-modal">
      <div id="edit-modal-header">
        <span id="edit-modal-filename"></span>
        <button id="edit-modal-close">✕</button>
      </div>
      <textarea id="edit-textarea"></textarea>
      <div id="edit-modal-actions">
        <button id="edit-cancel">cancel</button>
        <button id="edit-save">save changes</button>
      </div>
    </div>
  </div>

  <script src="projects.js"></script>
</body>
</html>
